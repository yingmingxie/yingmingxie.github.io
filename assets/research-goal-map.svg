      <path d="M95 146 C130 100 178 92 224 120 C251 136 273 137 296 119" fill="none" stroke="#00529b" stroke-width="4" stroke-linecap="round"/>
      <text x="193" y="118" fill="#0f2544" font-size="28" font-weight="850" text-anchor="middle">New Physics</text>
